{% load static %}
{% load django_vite %}
<!DOCTYPE html>
<html lang="en"
      data-theme-pref="{{ theme_preference|default:'system' }}"
      data-authed="{% if user.is_authenticated %}1{% else %}0{% endif %}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ProblemBuddy</title>
    <script>
      (function () {
        try {
          var root = document.documentElement;
          var pref = root.dataset.themePref || 'system';
          if (root.dataset.authed !== '1') {
            var stored = null;
            try { stored = localStorage.getItem('pb_theme'); } catch (_) {}
            if (stored === 'system' || stored === 'light' || stored === 'dark') pref = stored;
          }
          var effective = pref === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : pref;
          root.setAttribute('data-bs-theme', effective);
        } catch (e) {
          document.documentElement.setAttribute('data-bs-theme', 'light');
        }
      })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="{% static 'css/main.css' %}">
    {% vite_hmr_client %}
    {% vite_asset 'src/main.tsx' %}
    {% block header %}{% endblock %}
</head>
<body>
<script id="pb-boot-data" type="application/json">
{"authed": {% if user.is_authenticated %}true{% else %}false{% endif %}, "theme_preference": "{{ theme_preference|default:'system' }}"}
</script>
{% include 'navbar.html' %}

<main class="container my-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
