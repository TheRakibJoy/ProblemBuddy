{% extends 'main.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Login</h3>
        <form method="post" action="">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Codeforces handle</label>
            <input id="id_username" type="text" name="username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Password</label>
            <input id="id_password" type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="mt-3 text-center mb-0">
          Don't have an account? <a href="{% url 'register' %}">Sign up</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
