{% extends 'main.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="h3 card-title text-center mb-4">Create account</h1>
        <form method="post" action="" autocomplete="on">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Register</button>
        </form>
        <p class="mt-3 text-center mb-0">
          Already have an account? <a href="{% url 'login' %}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
